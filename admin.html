<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>관리자</title>
</head>
<body>
  <h2>웨이팅 관리</h2>

  <button onclick="load()">새로고침</button>
  <button onclick="clearAll()">전체 초기화</button>

  <ul id="list"></ul>

<script>
const API = "https://script.google.com/macros/s/AKfycbzvP5T3NN8wVTuAn64wNC5qoZH27omVL19OBKbD_fcprC-p4kwjqFPkYC8MvXZHGIcJ/exec";

// 목록 불러오기
async function load() {
  const res = await fetch(API);
  const data = await res.json();

  let list = document.getElementById("list");
  list.innerHTML = "";

  for (let i = 1; i < data.length; i++) {
    let name = data[i][0];
    let time = data[i][1];

    let date = new Date(time);
    let formatted = date.toLocaleTimeString();

    let li = document.createElement("li");
    li.innerText = i + ". " + name + " (" + formatted + ")";
    list.appendChild(li);
  }
}

// 전체 초기화
async function clearAll() {
  if (!confirm("진짜 초기화할거야?")) return;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "clear" })
  });

  alert("초기화 완료");
  load();
}

// 자동 새로고침 (5초마다)
setInterval(load, 5000);

// 처음 실행
load();
</script>
</body>
</html>
