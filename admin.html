<!DOCTYPE html>
<html>
<body>
  <h2>관리자</h2>

  <button onclick="load()">새로고침</button>

  <ul id="list"></ul>

<script>
const API = "https://script.google.com/macros/s/AKfycbwxoVfW52jITX5b4q-xs5zpUFZnw7K94lIRaRnWITT-qsb78mwAlLa9A-yrgc1FtdcV/exec";

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.slice(1).forEach((row, i) => {
    let li = document.createElement("li");
    li.innerText = (i + 1) + ". " + row[0];
    list.appendChild(li);
  });
}
</script>
</body>
</html>
