<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>웨이팅 등록</title>
</head>
<body>
  <h2>부스 웨이팅(이름/전화번호)</h2>

  <input id="name" placeholder="이름 입력">
  <button onclick="join()">대기 등록</button>

  <p id="result"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbzvP5T3NN8wVTuAn64wNC5qoZH27omVL19OBKbD_fcprC-p4kwjqFPkYC8MvXZHGIcJ/exec";

async function join() {
  const name = document.getElementById("name").value;
  if (!name) return alert("이름 입력!");

  // 1. 등록
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ name })
  });

  // 2. 전체 목록 가져오기
  const res = await fetch(API);
  const data = await res.json();

  // 3. 내 순번 계산 (맨 뒤 = 마지막)
  const myNumber = data.length - 1; // 첫 줄 제목 제외

  document.getElementById("result").innerText =
    name + "님 등록 완료!\n현재 대기번호: " + myNumber +
    "번\n앞에 " + (myNumber - 1) + "팀 있음";
}
</script>
</body>
</html>
