<!DOCTYPE html>
<html>
<body>
  <h2>웨이팅 등록</h2>

  <input id="name" placeholder="이름 입력">
  <button onclick="join()">등록</button>

  <p id="result"></p>

<script>
const API = "여기에_앱스크립트_URL";

async function join() {
  const name = document.getElementById("name").value;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ name })
  });

  document.getElementById("result").innerText = "등록 완료!";
}
</script>
</body>
</html>
