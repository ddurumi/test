<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>웨이팅 등록</title>
</head>
<body>
  <h2>부스 웨이팅</h2>

  <input id="name" placeholder="이름 입력">
  <button onclick="join()">대기 등록</button>

  <p id="result"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbwxoVfW52jITX5b4q-xs5zpUFZnw7K94lIRaRnWITT-qsb78mwAlLa9A-yrgc1FtdcV/exec";

async function join() {
  const name = document.getElementById("name").value;
  if (!name) return alert("이름 입력!");

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ name })
  });

  document.getElementById("result").innerText = "등록 완료!";
}
</script>
</body>
</html>
